<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA Notes - Workspace</title>
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --glass-bg: rgba(20, 20, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f2f2f7;
      --text-secondary: #8e8e93;
      --accent-color: #0a84ff;
      --danger-color: #ff453a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(circle at top right, #1a1a24, var(--bg-dark));
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100vw;
    }

    .screen.active {
      display: flex;
    }

    /* --- Auth Screen (Liquid Glass) --- */
    #auth-screen {
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      padding: 2.5rem 2rem;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .auth-box h2 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; }
    .auth-box p { color: var(--text-secondary); margin: 0.5rem 0 1.5rem 0; font-size: 0.9rem; }

    .auth-input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-primary);
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .auth-input:focus { border-color: var(--accent-color); }

    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent-color);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

    .error-msg {
      color: var(--danger-color);
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }

    /* --- App Layout (Mobile First) --- */
    #sidebar {
      position: absolute;
      top: 0;
      left: -100%;
      width: 80%;
      max-width: 300px;
      height: 100%;
      z-index: 10;
      transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    #sidebar.open { left: 0; }

    .sidebar-header {
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-header h3 { font-size: 1.1rem; font-weight: 600; }

    #note-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    #note-list li {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #note-list li:hover, #note-list li.active {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
    }

    .sidebar-footer {
      padding: 1rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    #editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .editor-header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-action:hover { background: rgba(255, 255, 255, 0.15); }

    .btn-danger {
      background: transparent;
      border: none;
      color: var(--danger-color);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .editor-content {
      flex: 1;
      padding: 2rem 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    #note-title {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 2.2rem;
      font-weight: 700;
      outline: none;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    #note-body {
      flex: 1;
      outline: none;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    #note-body:focus { color: var(--text-primary); }

    /* --- Notion-like Checklist Item --- */
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .checklist-item input[type="checkbox"] {
      margin-top: 5px;
      accent-color: var(--accent-color);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* --- Media Queries --- */
    @media (min-width: 768px) {
      #sidebar {
        position: relative;
        left: 0;
        width: 280px;
        border-right: 1px solid var(--glass-border);
      }
      #btn-toggle-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div id="auth-screen" class="screen active glass-panel">
    <div class="auth-box">
      <h2>WA Notes</h2>
      <p>Gerencie suas notas e checklists.</p>
      
      <div id="auth-error" class="error-msg"></div>

      <input type="email" id="auth-email" class="auth-input" placeholder="Seu e-mail..." />
      <input type="password" id="auth-password" class="auth-input" placeholder="Sua senha..." />
      
      <div class="auth-buttons">
        <button id="btn-login" class="btn-primary">Entrar</button>
        <button id="btn-register" class="btn-secondary">Criar Conta</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="screen">
    
    <nav id="sidebar" class="glass-panel">
      <div class="sidebar-header">
        <h3>Minhas Notas</h3>
        <button id="btn-new-note" class="btn-icon">+</button>
      </div>
      
      <ul id="note-list"></ul>

      <div class="sidebar-footer">
        <span id="user-display">Usuário</span>
        <button id="btn-logout" class="btn-danger">Sair</button>
      </div>
    </nav>
    
    <main id="editor">
      <header class="editor-header glass-panel">
        <div class="header-left">
          <button id="btn-toggle-sidebar" class="btn-icon">☰</button>
          <div class="toolbar">
            <button id="btn-add-checklist" class="btn-action">☑ Checklist</button>
          </div>
        </div>
      </header>
      
      <div class="editor-content">
        <input type="text" id="note-title" placeholder="Título da página..." />
        <div id="note-body" contenteditable="true" placeholder="Comece a digitar ou adicione um checklist..."></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Configuração do seu Projeto Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDS7gR-fUn7TsFyVjhsF3QW7of2ZwHfR7A",
      authDomain: "wanotes-c295e.firebaseapp.com",
      projectId: "wanotes-c295e",
      storageBucket: "wanotes-c295e.firebasestorage.app",
      messagingSenderId: "965036265409",
      appId: "1:965036265409:web:75e5bcaa59aae960682940",
      measurementId: "G-XSRFDL8HF1"
    };

    // Inicialização do Firebase e Auth
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    // Variáveis de Estado
    let currentUser = null;
    let notes = [];
    let currentNoteId = null;

    // Elementos da DOM
    const authScreen = document.getElementById('auth-screen');
    const appScreen = document.getElementById('app-screen');
    const authError = document.getElementById('auth-error');
    const emailInput = document.getElementById('auth-email');
    const passwordInput = document.getElementById('auth-password');
    const userDisplay = document.getElementById('user-display');
    const sidebar = document.getElementById('sidebar');
    const noteList = document.getElementById('note-list');
    const noteTitle = document.getElementById('note-title');
    const noteBody = document.getElementById('note-body');

    // --- LÓGICA DE AUTENTICAÇÃO ---

    function showError(message) {
      authError.textContent = message;
      authError.style.display = 'block';
    }

    function hideError() {
      authError.style.display = 'none';
    }

    // Login
    document.getElementById('btn-login').addEventListener('click', async () => {
      hideError();
      try {
        await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
      } catch (error) {
        if (error.code === 'auth/invalid-credential') showError("E-mail ou senha incorretos.");
        else showError("Erro ao entrar: " + error.message);
      }
    });

    // Cadastro
    document.getElementById('btn-register').addEventListener('click', async () => {
      hideError();
      if (!emailInput.value || passwordInput.value.length < 6) {
        showError("A senha deve ter pelo menos 6 caracteres.");
        return;
      }
      try {
        await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
      } catch (error) {
        if (error.code === 'auth/email-already-in-use') showError("Este e-mail já está em uso.");
        else showError("Erro ao criar conta: " + error.message);
      }
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth);
    });

    // Observador de Estado (Logado vs Deslogado)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        userDisplay.textContent = user.email.split('@')[0];
        authScreen.classList.remove('active');
        appScreen.classList.add('active');
        emailInput.value = '';
        passwordInput.value = '';
        initApp();
      } else {
        currentUser = null;
        appScreen.classList.remove('active');
        authScreen.classList.add('active');
      }
    });

    // --- LÓGICA DO APP E NOTAS ---

    function initApp() {
      // Carrega as notas salvas no localStorage específicas para este UID do usuário
      const saved = localStorage.getItem(`notes_${currentUser.uid}`);
      notes = saved ? JSON.parse(saved) : [];

      if (notes.length === 0) {
        createNewNote();
      } else {
        currentNoteId = notes[0].id;
        renderSidebar();
        loadNote(currentNoteId);
      }
    }

    function renderSidebar() {
      noteList.innerHTML = '';
      notes.forEach(note => {
        const li = document.createElement('li');
        li.textContent = note.title || 'Sem título';
        if (note.id === currentNoteId) li.classList.add('active');
        
        li.addEventListener('click', () => {
          sidebar.classList.remove('open');
          loadNote(note.id);
        });
        noteList.appendChild(li);
      });
    }

    function createNewNote() {
      const newNote = {
        id: Date.now().toString(),
        title: '',
        content: ''
      };
      notes.unshift(newNote);
      currentNoteId = newNote.id;
      saveData();
      renderSidebar();
      loadNote(currentNoteId);
    }

    function loadNote(id) {
      currentNoteId = id;
      const note = notes.find(n => n.id === id);
      if (note) {
        noteTitle.value = note.title;
        noteBody.innerHTML = note.content;
        renderSidebar();
      }
    }

    function saveData() {
      if (!currentNoteId || !currentUser) return;
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.title = noteTitle.value;
        note.content = noteBody.innerHTML;
        // Salva isolado no localStorage por conta do UID do Firebase
        localStorage.setItem(`notes_${currentUser.uid}`, JSON.stringify(notes)); 
      }
      renderSidebar();
    }

    // Auto-save ao digitar
    noteTitle.addEventListener('input', saveData);
    noteBody.addEventListener('input', saveData);

    // Controles do App
    document.getElementById('btn-new-note').addEventListener('click', createNewNote);
    document.getElementById('btn-toggle-sidebar').addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    // Bloco de Checklist Estilo Notion
    document.getElementById('btn-add-checklist').addEventListener('click', () => {
      const checklistId = 'check-' + Date.now();
      const html = `
        <div class="checklist-item">
          <input type="checkbox" id="${checklistId}">
          <div contenteditable="true" style="flex:1; outline:none;" placeholder="Item da lista..."></div>
        </div>
      `;
      
      noteBody.focus();
      document.execCommand('insertHTML', false, html);
      saveData();
    });
  </script>
</body>
</html>
