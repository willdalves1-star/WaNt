<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WA Notes - Workspace</title>
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --glass-bg: rgba(20, 20, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f2f2f7;
      --text-secondary: #8e8e93;
      --accent-color: #0a84ff;
      --danger-color: #ff453a;
      --drag-over-bg: rgba(10, 132, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(circle at top right, #1a1a24, var(--bg-dark));
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
    }

    .screen {
      display: none;
      height: 100vh;
      width: 100vw;
    }

    .screen.active {
      display: flex;
    }

    /* --- Auth Screen (Liquid Glass) --- */
    #auth-screen {
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      padding: 2.5rem 2rem;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .auth-box h2 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; }
    .auth-box p { color: var(--text-secondary); margin: 0.5rem 0 1.5rem 0; font-size: 0.9rem; }

    .auth-input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-primary);
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .auth-input:focus { border-color: var(--accent-color); }

    .auth-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--accent-color);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

    .error-msg {
      color: var(--danger-color);
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }

    /* --- App Layout (Mobile First) --- */
    #sidebar {
      position: absolute;
      top: 0;
      left: -100%;
      width: 80%;
      max-width: 320px;
      height: 100%;
      z-index: 10;
      transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
    }

    #sidebar.open { left: 0; }

    .sidebar-header {
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .sidebar-header h3 { font-size: 1.1rem; font-weight: 600; }

    .drag-hint {
      font-size: 0.7rem;
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.7;
    }

    #note-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 0;
    }

    #note-list li {
      padding: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #note-list li:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    #note-list li.active {
      background: rgba(255, 255, 255, 0.08);
    }

    #note-list li.dragging {
      opacity: 0.4;
      background: rgba(10, 132, 255, 0.2);
      border: 2px dashed var(--accent-color);
      border-radius: 8px;
      transform: scale(0.95);
      z-index: 5;
    }

    #note-list li.drag-over {
      background: var(--drag-over-bg);
      border-top: 3px solid var(--accent-color);
    }

    .note-item-wrapper {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.85rem 1rem;
      gap: 8px;
      pointer-events: none;
    }

    .note-item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .note-item-title {
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .note-item-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .btn-delete-note {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      font-size: 1rem;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      pointer-events: auto;
      position: relative;
      z-index: 10;
    }

    .btn-delete-note:hover {
      color: var(--danger-color);
      background: rgba(255, 69, 58, 0.15);
    }

    .sidebar-footer {
      padding: 1rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .import-export-buttons {
      display: flex;
      gap: 8px;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--glass-border);
    }

    .btn-import-export {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-import-export:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #import-file-input {
      display: none;
    }

    #editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      overflow: hidden;
    }

    .editor-header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-action:hover { background: rgba(255, 255, 255, 0.15); }

    .btn-danger {
      background: transparent;
      border: none;
      color: var(--danger-color);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .editor-content {
      flex: 1;
      padding: 2rem 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    #note-title {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 2.2rem;
      font-weight: 700;
      outline: none;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    #note-body {
      flex: 1;
      outline: none;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    #note-body:focus { color: var(--text-primary); }

    .note-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
      flex-wrap: wrap;
    }

    .note-date {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .note-date-label {
      font-weight: 600;
      color: var(--text-primary);
      margin-right: 4px;
    }

    /* --- Notion-like Checklist Item --- */
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .checklist-item input[type="checkbox"] {
      margin-top: 5px;
      accent-color: var(--accent-color);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Modal de confirmação */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1c1c1e;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .modal-box h4 {
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .modal-box p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-confirm-delete {
      background: var(--danger-color);
      color: #fff;
    }

    /* Feedback visual ao arrastar */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      background: rgba(10, 132, 255, 0.25);
      border: 2px solid var(--accent-color);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 500;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transform: translate(-50%, -50%);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    /* --- Media Queries --- */
    @media (min-width: 768px) {
      #sidebar {
        position: relative;
        left: 0;
        width: 320px;
        border-right: 1px solid var(--glass-border);
      }
      #btn-toggle-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <div id="auth-screen" class="screen active glass-panel">
    <div class="auth-box">
      <h2>WA Notes</h2>
      <p>Gerencie suas notas e checklists.</p>
      
      <div id="auth-error" class="error-msg"></div>

      <input type="email" id="auth-email" class="auth-input" placeholder="Seu e-mail..." />
      <input type="password" id="auth-password" class="auth-input" placeholder="Sua senha..." />
      
      <div class="auth-buttons">
        <button id="btn-login" class="btn-primary">Entrar</button>
        <button id="btn-register" class="btn-secondary">Criar Conta</button>
      </div>
    </div>
  </div>

  <div id="app-screen" class="screen">
    
    <nav id="sidebar" class="glass-panel">
      <div class="sidebar-header">
        <h3>Minhas Notas</h3>
        <button id="btn-new-note" class="btn-icon">+</button>
      </div>
      
      <div class="drag-hint">
        <span>✋</span>
        <span>Toque longo e arraste para reordenar</span>
      </div>
      
      <ul id="note-list"></ul>

      <div class="sidebar-footer">
        <span id="user-display">Usuário</span>
        <button id="btn-logout" class="btn-danger">Sair</button>
      </div>
      <div class="import-export-buttons">
        <button id="btn-export-notes" class="btn-import-export">📤 Exportar</button>
        <button id="btn-import-notes" class="btn-import-export">📥 Importar</button>
        <input type="file" id="import-file-input" accept=".json" />
      </div>
    </nav>
    
    <main id="editor">
      <header class="editor-header glass-panel">
        <div class="header-left">
          <button id="btn-toggle-sidebar" class="btn-icon">☰</button>
          <div class="toolbar">
            <button id="btn-add-checklist" class="btn-action">☑ Checklist</button>
          </div>
        </div>
        <button id="btn-delete-current" class="btn-danger" style="display: none;">🗑 Excluir</button>
      </header>
      
      <div class="editor-content">
        <div class="note-meta">
          <span class="note-date">
            <span class="note-date-label">Criado:</span>
            <span id="note-created">—</span>
          </span>
          <span class="note-date">
            <span class="note-date-label">Atualizado:</span>
            <span id="note-updated">—</span>
          </span>
        </div>
        <input type="text" id="note-title" placeholder="Título da página..." />
        <div id="note-body" contenteditable="true" placeholder="Comece a digitar ou adicione um checklist..."></div>
      </div>
    </main>
  </div>

  <!-- Modal de confirmação para excluir -->
  <div id="delete-modal" class="modal-overlay">
    <div class="modal-box">
      <h4>Excluir nota</h4>
      <p>Tem certeza que deseja excluir esta nota? Esta ação não pode ser desfeita.</p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn-cancel">Cancelar</button>
        <button id="btn-confirm-delete" class="btn-confirm-delete">Excluir</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      doc, 
      setDoc, 
      getDocs, 
      deleteDoc, 
      query, 
      orderBy,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Configuração do seu Projeto Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDS7gR-fUn7TsFyVjhsF3QW7of2ZwHfR7A",
      authDomain: "wanotes-c295e.firebaseapp.com",
      projectId: "wanotes-c295e",
      storageBucket: "wanotes-c295e.firebasestorage.app",
      messagingSenderId: "965036265409",
      appId: "1:965036265409:web:75e5bcaa59aae960682940",
      measurementId: "G-XSRFDL8HF1"
    };

    // Inicialização do Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Variáveis de Estado
    let currentUser = null;
    let notes = [];
    let currentNoteId = null;
    let noteToDelete = null;

    // Variáveis para Drag and Drop
    let draggedItem = null;
    let draggedNoteId = null;
    let dragGhost = null;
    let touchStartY = 0;
    let touchStartX = 0;
    let touchStartTime = 0;
    let isDragging = false;
    let longPressTimeout = null;
    let hasMoved = false;

    // Elementos da DOM
    const authScreen = document.getElementById('auth-screen');
    const appScreen = document.getElementById('app-screen');
    const authError = document.getElementById('auth-error');
    const emailInput = document.getElementById('auth-email');
    const passwordInput = document.getElementById('auth-password');
    const userDisplay = document.getElementById('user-display');
    const sidebar = document.getElementById('sidebar');
    const noteList = document.getElementById('note-list');
    const noteTitle = document.getElementById('note-title');
    const noteBody = document.getElementById('note-body');
    const noteCreated = document.getElementById('note-created');
    const noteUpdated = document.getElementById('note-updated');
    const deleteModal = document.getElementById('delete-modal');
    const btnDeleteCurrent = document.getElementById('btn-delete-current');

    // --- LÓGICA DE AUTENTICAÇÃO ---

    function showError(message) {
      authError.textContent = message;
      authError.style.display = 'block';
    }

    function hideError() {
      authError.style.display = 'none';
    }

    document.getElementById('btn-login').addEventListener('click', async () => {
      hideError();
      try {
        await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
      } catch (error) {
        if (error.code === 'auth/invalid-credential') showError("E-mail ou senha incorretos.");
        else showError("Erro ao entrar: " + error.message);
      }
    });

    document.getElementById('btn-register').addEventListener('click', async () => {
      hideError();
      if (!emailInput.value || passwordInput.value.length < 6) {
        showError("A senha deve ter pelo menos 6 caracteres.");
        return;
      }
      try {
        await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
      } catch (error) {
        if (error.code === 'auth/email-already-in-use') showError("Este e-mail já está em uso.");
        else showError("Erro ao criar conta: " + error.message);
      }
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth);
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        userDisplay.textContent = user.email.split('@')[0];
        authScreen.classList.remove('active');
        appScreen.classList.add('active');
        emailInput.value = '';
        passwordInput.value = '';
        initApp();
      } else {
        currentUser = null;
        appScreen.classList.remove('active');
        authScreen.classList.add('active');
      }
    });

    // --- LÓGICA DO APP E NOTAS (COM FIRESTORE) ---

    function formatDate(timestamp) {
      if (!timestamp) return '—';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
        return 'Hoje às ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }
      
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      if (date.getDate() === yesterday.getDate() && 
          date.getMonth() === yesterday.getMonth() && 
          date.getFullYear() === yesterday.getFullYear()) {
        return 'Ontem às ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }
      
      return date.toLocaleDateString('pt-BR', { 
        day: '2-digit', 
        month: '2-digit', 
        year: 'numeric' 
      }) + ' às ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    // Carregar notas do Firestore
    async function loadNotesFromFirestore() {
      if (!currentUser) return [];
      
      try {
        const notesRef = collection(db, 'users', currentUser.uid, 'notes');
        const q = query(notesRef, orderBy('order', 'asc'));
        const querySnapshot = await getDocs(q);
        
        const loadedNotes = [];
        querySnapshot.forEach((doc) => {
          loadedNotes.push({
            id: doc.id,
            ...doc.data()
          });
        });
        
        return loadedNotes;
      } catch (error) {
        console.error('Erro ao carregar notas:', error);
        return [];
      }
    }

    // Salvar nota no Firestore
    async function saveNoteToFirestore(note) {
      if (!currentUser) return;
      
      try {
        const noteRef = doc(db, 'users', currentUser.uid, 'notes', note.id);
        await setDoc(noteRef, {
          title: note.title || '',
          content: note.content || '',
          createdAt: note.createdAt,
          updatedAt: note.updatedAt,
          order: note.order || 0
        });
      } catch (error) {
        console.error('Erro ao salvar nota:', error);
      }
    }

    // Deletar nota do Firestore
    async function deleteNoteFromFirestore(noteId) {
      if (!currentUser) return;
      
      try {
        const noteRef = doc(db, 'users', currentUser.uid, 'notes', noteId);
        await deleteDoc(noteRef);
      } catch (error) {
        console.error('Erro ao deletar nota:', error);
      }
    }

    // Salvar todas as notas no Firestore (usado para reordenar e importar)
    async function saveAllNotesToFirestore() {
      if (!currentUser) return;
      
      try {
        const batch = writeBatch(db);
        const notesRef = collection(db, 'users', currentUser.uid, 'notes');
        
        // Primeiro, deleta todas as notas existentes
        const querySnapshot = await getDocs(notesRef);
        querySnapshot.forEach((document) => {
          batch.delete(document.ref);
        });
        
        // Depois, salva todas as notas atuais
        notes.forEach(note => {
          const noteRef = doc(db, 'users', currentUser.uid, 'notes', note.id);
          batch.set(noteRef, {
            title: note.title || '',
            content: note.content || '',
            createdAt: note.createdAt,
            updatedAt: note.updatedAt,
            order: note.order || 0
          });
        });
        
        await batch.commit();
      } catch (error) {
        console.error('Erro ao salvar todas as notas:', error);
      }
    }

    async function initApp() {
      // Carrega as notas do Firestore
      notes = await loadNotesFromFirestore();

      notes.forEach((note, index) => {
        if (note.order === undefined) {
          note.order = index;
        }
      });

      if (notes.length === 0) {
        createNewNote();
      } else {
        notes.sort((a, b) => a.order - b.order);
        currentNoteId = notes[0].id;
        renderSidebar();
        loadNote(currentNoteId);
      }
    }

    // --- SISTEMA DE DRAG AND DROP COM TOQUE LONGO ---

    function createDragGhost(text) {
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = text || 'Sem título';
      document.body.appendChild(ghost);
      return ghost;
    }

    function removeDragGhost() {
      if (dragGhost) {
        dragGhost.remove();
        dragGhost = null;
      }
    }

    function startDragging(noteId, element, clientX, clientY) {
      draggedNoteId = noteId;
      draggedItem = element;
      isDragging = true;
      hasMoved = true;
      
      element.classList.add('dragging');
      
      const note = notes.find(n => n.id === noteId);
      dragGhost = createDragGhost(note ? note.title : 'Sem título');
      
      if (dragGhost) {
        dragGhost.style.left = clientX + 'px';
        dragGhost.style.top = clientY + 'px';
      }
      
      const items = noteList.querySelectorAll('li');
      items.forEach(item => {
        item.style.transition = 'none';
      });
    }

    function handleDragMove(clientX, clientY) {
      if (!isDragging || !draggedItem) return;
      
      if (dragGhost) {
        dragGhost.style.left = clientX + 'px';
        dragGhost.style.top = clientY + 'px';
      }
      
      const items = [...noteList.querySelectorAll('li:not(.dragging)')];
      
      items.forEach(item => item.classList.remove('drag-over'));
      
      const targetItem = items.find(item => {
        const rect = item.getBoundingClientRect();
        return clientY >= rect.top && clientY <= rect.bottom;
      });
      
      if (targetItem) {
        targetItem.classList.add('drag-over');
      }
    }

    function stopDragging(clientY) {
      if (!isDragging) return;
      
      if (draggedItem) {
        draggedItem.classList.remove('dragging');
      }
      
      const items = noteList.querySelectorAll('li');
      items.forEach(item => {
        item.classList.remove('drag-over');
        item.style.transition = '';
      });
      
      const targetItem = [...items].find(item => {
        if (item === draggedItem) return false;
        const rect = item.getBoundingClientRect();
        return clientY >= rect.top && clientY <= rect.bottom;
      });
      
      if (targetItem && draggedNoteId) {
        const targetNoteId = targetItem.dataset.noteId;
        reorderNotes(draggedNoteId, targetNoteId);
      }
      
      removeDragGhost();
      draggedItem = null;
      draggedNoteId = null;
      isDragging = false;
      hasMoved = false;
    }

    function reorderNotes(draggedId, targetId) {
      const draggedIndex = notes.findIndex(n => n.id === draggedId);
      const targetIndex = notes.findIndex(n => n.id === targetId);
      
      if (draggedIndex === -1 || targetIndex === -1) return;
      
      const [draggedNote] = notes.splice(draggedIndex, 1);
      notes.splice(targetIndex, 0, draggedNote);
      
      notes.forEach((note, index) => {
        note.order = index;
      });
      
      // Salva no Firestore em vez de localStorage
      saveAllNotesToFirestore();
      renderSidebar();
    }

    // Handlers de Touch para toda a nota
    function handleTouchStart(e) {
      // Ignora se for no botão de deletar
      if (e.target.closest('.btn-delete-note')) return;
      
      const li = e.target.closest('li');
      if (!li) return;
      
      const noteId = li.dataset.noteId;
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      touchStartTime = Date.now();
      hasMoved = false;
      
      // Configura o toque longo (500ms)
      clearLongPressTimeout();
      longPressTimeout = setTimeout(() => {
        if (!hasMoved) {
          startDragging(noteId, li, e.touches[0].clientX, e.touches[0].clientY);
          // Vibração tátil se disponível
          if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(50);
          }
        }
      }, 500);
    }

    function handleTouchMove(e) {
      if (!isDragging) {
        // Verifica se houve movimento suficiente para cancelar o toque longo
        const moveY = Math.abs(e.touches[0].clientY - touchStartY);
        const moveX = Math.abs(e.touches[0].clientX - touchStartX);
        
        if (moveX > 10 || moveY > 10) {
          hasMoved = true;
          clearLongPressTimeout();
        }
        return;
      }
      
      e.preventDefault();
      handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
    }

    function handleTouchEnd(e) {
      clearLongPressTimeout();
      
      if (isDragging) {
        const clientY = e.changedTouches[0].clientY;
        stopDragging(clientY);
        return;
      }
      
      // Se não estava arrastando e não moveu muito, é um clique normal
      if (!hasMoved) {
        const li = e.target.closest('li');
        if (li && !e.target.closest('.btn-delete-note')) {
          const noteId = li.dataset.noteId;
          sidebar.classList.remove('open');
          loadNote(noteId);
        }
      }
    }

    // Handlers de Mouse
    function handleMouseDown(e) {
      // Ignora se for no botão de deletar
      if (e.target.closest('.btn-delete-note')) return;
      
      const li = e.target.closest('li');
      if (!li) return;
      
      const noteId = li.dataset.noteId;
      touchStartY = e.clientY;
      touchStartX = e.clientX;
      touchStartTime = Date.now();
      hasMoved = false;
      
      // Para mouse, o drag começa mais rápido (200ms)
      clearLongPressTimeout();
      longPressTimeout = setTimeout(() => {
        if (!hasMoved) {
          startDragging(noteId, li, e.clientX, e.clientY);
        }
      }, 200);
      
      document.addEventListener('mousemove', handleMouseMove);
      document.addEventListener('mouseup', handleMouseUp);
    }

    function handleMouseMove(e) {
      const moveY = Math.abs(e.clientY - touchStartY);
      const moveX = Math.abs(e.clientX - touchStartX);
      
      if (!isDragging) {
        if (moveX > 5 || moveY > 5) {
          hasMoved = true;
          clearLongPressTimeout();
        }
        return;
      }
      
      handleDragMove(e.clientX, e.clientY);
    }

    function handleMouseUp(e) {
      clearLongPressTimeout();
      
      if (isDragging) {
        stopDragging(e.clientY);
      } else if (!hasMoved) {
        // Clique normal
        const li = e.target.closest('li');
        if (li && !e.target.closest('.btn-delete-note')) {
          const noteId = li.dataset.noteId;
          sidebar.classList.remove('open');
          loadNote(noteId);
        }
      }
      
      document.removeEventListener('mousemove', handleMouseMove);
      document.removeEventListener('mouseup', handleMouseUp);
    }

    function clearLongPressTimeout() {
      if (longPressTimeout) {
        clearTimeout(longPressTimeout);
        longPressTimeout = null;
      }
    }

    function setupDragListeners() {
      // Remove listeners antigos
      noteList.removeEventListener('touchstart', handleTouchStart);
      noteList.removeEventListener('touchmove', handleTouchMove);
      noteList.removeEventListener('touchend', handleTouchEnd);
      noteList.removeEventListener('mousedown', handleMouseDown);
      
      // Adiciona novos listeners
      noteList.addEventListener('touchstart', handleTouchStart, { passive: false });
      noteList.addEventListener('touchmove', handleTouchMove, { passive: false });
      noteList.addEventListener('touchend', handleTouchEnd);
      noteList.addEventListener('mousedown', handleMouseDown);
    }

    // --- RENDERIZAÇÃO ---

    function renderSidebar() {
      noteList.innerHTML = '';
      
      notes.forEach(note => {
        const li = document.createElement('li');
        li.dataset.noteId = note.id;
        
        if (note.id === currentNoteId) li.classList.add('active');
        
        // Wrapper
        const wrapper = document.createElement('div');
        wrapper.className = 'note-item-wrapper';
        
        // Container do conteúdo
        const contentDiv = document.createElement('div');
        contentDiv.className = 'note-item-content';
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'note-item-title';
        titleSpan.textContent = note.title || 'Sem título';
        
        const dateSpan = document.createElement('span');
        dateSpan.className = 'note-item-date';
        dateSpan.textContent = formatDate(note.updatedAt || note.createdAt);
        
        contentDiv.appendChild(titleSpan);
        contentDiv.appendChild(dateSpan);
        
        // Botão de excluir
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn-delete-note';
        deleteBtn.innerHTML = '🗑';
        deleteBtn.title = 'Excluir nota';
        
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();
          noteToDelete = note.id;
          deleteModal.classList.add('active');
        });
        
        wrapper.appendChild(contentDiv);
        wrapper.appendChild(deleteBtn);
        li.appendChild(wrapper);
        noteList.appendChild(li);
      });
      
      setupDragListeners();
    }

    async function createNewNote() {
      const timestamp = Date.now();
      const newNote = {
        id: timestamp.toString(),
        title: '',
        content: '',
        createdAt: timestamp,
        updatedAt: timestamp,
        order: 0
      };
      
      notes.forEach(note => {
        note.order = (note.order || 0) + 1;
      });
      
      notes.unshift(newNote);
      currentNoteId = newNote.id;
      
      // Salva no Firestore
      await saveAllNotesToFirestore();
      renderSidebar();
      loadNote(currentNoteId);
    }

    function loadNote(id) {
      currentNoteId = id;
      const note = notes.find(n => n.id === id);
      if (note) {
        noteTitle.value = note.title;
        noteBody.innerHTML = note.content;
        noteCreated.textContent = formatDate(note.createdAt);
        noteUpdated.textContent = formatDate(note.updatedAt);
        btnDeleteCurrent.style.display = 'inline-block';
        renderSidebar();
      }
    }

    async function saveData() {
      if (!currentNoteId || !currentUser) return;
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.title = noteTitle.value;
        note.content = noteBody.innerHTML;
        note.updatedAt = Date.now();
        
        // Salva no Firestore
        await saveNoteToFirestore(note);
        noteUpdated.textContent = formatDate(note.updatedAt);
      }
      renderSidebar();
    }

    async function deleteNote(id) {
      const noteIndex = notes.findIndex(n => n.id === id);
      if (noteIndex === -1) return;
      
      notes.splice(noteIndex, 1);
      
      // Deleta do Firestore
      await deleteNoteFromFirestore(id);
      
      if (currentNoteId === id) {
        if (notes.length > 0) {
          currentNoteId = notes[0].id;
          loadNote(currentNoteId);
        } else {
          createNewNote();
        }
      }
      
      renderSidebar();
    }

    // Auto-save com debounce para não sobrecarregar o Firestore
    let saveTimeout;
    noteTitle.addEventListener('input', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveData, 1000);
    });
    
    noteBody.addEventListener('input', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveData, 1000);
    });

    // Controles
    document.getElementById('btn-new-note').addEventListener('click', createNewNote);
    document.getElementById('btn-toggle-sidebar').addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    btnDeleteCurrent.addEventListener('click', () => {
      noteToDelete = currentNoteId;
      deleteModal.classList.add('active');
    });

    // Modal
    document.getElementById('btn-cancel-delete').addEventListener('click', () => {
      noteToDelete = null;
      deleteModal.classList.remove('active');
    });

    document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
      if (noteToDelete) {
        await deleteNote(noteToDelete);
        noteToDelete = null;
      }
      deleteModal.classList.remove('active');
    });

    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) {
        noteToDelete = null;
        deleteModal.classList.remove('active');
      }
    });

    // Checklist
    document.getElementById('btn-add-checklist').addEventListener('click', () => {
      const checklistId = 'check-' + Date.now();
      const html = `
        <div class="checklist-item">
          <input type="checkbox" id="${checklistId}">
          <div contenteditable="true" style="flex:1; outline:none;" placeholder="Item da lista..."></div>
        </div>
      `;
      
      noteBody.focus();
      document.execCommand('insertHTML', false, html);
      saveData();
    });

    // Fechar sidebar ao clicar fora no mobile
    document.addEventListener('click', (e) => {
      if (window.innerWidth < 768 && 
          sidebar.classList.contains('open') && 
          !sidebar.contains(e.target) && 
          e.target.id !== 'btn-toggle-sidebar') {
        sidebar.classList.remove('open');
      }
    });

    // --- FUNÇÕES DE IMPORT/EXPORT ---

    // Exportar notas
    document.getElementById('btn-export-notes').addEventListener('click', () => {
      if (!currentUser) return;
      
      const exportData = {
        appName: "WA Notes",
        exportDate: new Date().toISOString(),
        userEmail: currentUser.email,
        notes: notes
      };
      
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `wanotes-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // Importar notas - acionar o input file
    document.getElementById('btn-import-notes').addEventListener('click', () => {
      document.getElementById('import-file-input').click();
    });

    // Processar o arquivo importado
    document.getElementById('import-file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !currentUser) return;
      
      const reader = new FileReader();
      
      reader.onload = async (event) => {
        try {
          const importedData = JSON.parse(event.target.result);
          
          // Valida o formato do arquivo
          if (!importedData.notes || !Array.isArray(importedData.notes)) {
            alert('Arquivo inválido! O formato não corresponde a um backup do WA Notes.');
            return;
          }
          
          // Confirmação antes de importar
          if (!confirm(`Deseja importar ${importedData.notes.length} notas? Isso substituirá suas notas atuais.`)) {
            return;
          }
          
          // Substitui as notas atuais
          notes = importedData.notes;
          
          // Atualiza a ordem se necessário
          notes.forEach((note, index) => {
            if (note.order === undefined) {
              note.order = index;
            }
          });
          
          // Salva no Firestore
          await saveAllNotesToFirestore();
          
          if (notes.length > 0) {
            currentNoteId = notes[0].id;
            loadNote(currentNoteId);
          } else {
            createNewNote();
          }
          
          renderSidebar();
          alert('Notas importadas com sucesso!');
          
        } catch (error) {
          alert('Erro ao importar o arquivo. Certifique-se de que é um arquivo JSON válido.');
          console.error('Erro na importação:', error);
        }
      };
      
      reader.readAsText(file);
      
      // Limpa o input para permitir importar o mesmo arquivo novamente
      e.target.value = '';
    });
  </script>
</body>
</html>
